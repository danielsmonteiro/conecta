# HealthMatch — stack de DESENVOLVIMENTO (hot reload).
#   docker compose up --build
#   frontend: http://localhost:3001   backend: http://localhost:3000/api
name: healthmatch-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthmatch}
      POSTGRES_DB: ${POSTGRES_DB:-healthmatch}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-healthmatch}']
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthmatch}:${POSTGRES_PASSWORD:-healthmatch}@db:5432/${POSTGRES_DB:-healthmatch}?schema=public
      PORT: '3000'
      # O frontend é proxy same-origin (/api), então CORS normalmente nem entra em
      # jogo. Mantemos origens da LAN liberadas caso o backend (:3000) seja chamado
      # direto do browser de outra máquina. Ajuste CORS_ORIGIN no .env para seu IP.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001,http://192.168.1.147:3001,http://192.168.1.208:3001}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_ACCESS_TTL: '900'
      JWT_REFRESH_TTL: '604800'
      COOKIE_SECURE: 'false'
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@healthmatch.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme123}
      # OpenWA (app separado, na rede compartilhada openwa-network). Default de
      # envio segue Twilio; OpenWA é opt-in (MESSAGING_PROVIDER=openwa por conversa/teste).
      OPENWA_BASE_URL: http://openwa-api:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY:-}
      OPENWA_SESSION: ${OPENWA_SESSION:-default}
      OPENWA_WEBHOOK_SECRET: ${OPENWA_WEBHOOK_SECRET:-}
      OPENWA_VALIDATE_WEBHOOK: ${OPENWA_VALIDATE_WEBHOOK:-true}
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             (npm run db:seed || true) &&
             npm run start:dev"
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    networks:
      - default
      - openwa

  frontend:
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3001:3000'

volumes:
  pgdata:

networks:
  # Rede do app (db, backend, frontend).
  default:
  # Rede compartilhada com o app OpenWA (criada pelo compose do OpenWA).
  # Permite backend → http://openwa-api:2785 e OpenWA → http://backend:3000.
  openwa:
    external: true
    name: openwa-network
