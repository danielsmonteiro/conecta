# Conecta/HealthMatch — ambiente ÚNICO: nomenclatura de produção, estado de
# desenvolvimento (hot-reload). Servido por HTTPS no domínio (APP_DOMAIN) via Caddy.
#   docker compose up -d --build
#   App: https://${APP_DOMAIN}  ·  editar /root/conecta reflete na hora (watch).
name: healthmatch-prod

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthmatch}
      POSTGRES_DB: ${POSTGRES_DB:-healthmatch}
    # Exposto só no loopback (acesso local/túnel SSH); não publicar Postgres na internet.
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-healthmatch}']
      interval: 5s
      timeout: 5s
      retries: 12

  # Fila durável (BullMQ) para o processamento de IA dos inbounds. AOF ligado p/
  # sobreviver a restart. Só no loopback — não publicar Redis na internet.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthmatch}:${POSTGRES_PASSWORD:-healthmatch}@db:5432/${POSTGRES_DB:-healthmatch}?schema=public
      PORT: '3000'
      # Fila durável (Redis/BullMQ) para o processamento de IA dos inbounds.
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # Fuso da aplicação (default Fortaleza, parametrizável). Banco fica em UTC.
      TZ: ${TZ:-America/Fortaleza}
      # Identidade pública (domínio HTTPS via Caddy).
      PUBLIC_BASE_URL: https://${APP_DOMAIN:?defina APP_DOMAIN no .env}
      CORS_ORIGIN: https://${APP_DOMAIN}
      COOKIE_SECURE: 'true'
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_ACCESS_TTL: '900'
      JWT_REFRESH_TTL: '604800'
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@healthmatch.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme123}
      # Twilio (oficial). Segredos via .env (git-ignored).
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_DEFAULT_CONTENT_SID: ${TWILIO_DEFAULT_CONTENT_SID:-}
      TWILIO_VALIDATE_SIGNATURE: ${TWILIO_VALIDATE_SIGNATURE:-true}
      # OpenWA (app separado, na rede compartilhada openwa-network). Opt-in por conversa/teste.
      OPENWA_BASE_URL: http://openwa-api:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY:-}
      OPENWA_SESSION: ${OPENWA_SESSION:-default}
      OPENWA_WEBHOOK_SECRET: ${OPENWA_WEBHOOK_SECRET:-}
      OPENWA_VALIDATE_WEBHOOK: ${OPENWA_VALIDATE_WEBHOOK:-true}
      OPENWA_SIGNATURE_HEADER: ${OPENWA_SIGNATURE_HEADER:-x-openwa-signature}
      OPENWA_HMAC_ALGO: ${OPENWA_HMAC_ALGO:-sha256}
      # IA (Épico 2). Provedor default = OpenAI; segredos via .env (git-ignored).
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_AUTO_REPLY: ${AI_AUTO_REPLY:-true}
      AI_DRY_RUN: ${AI_DRY_RUN:-true}
      AI_REQUIRE_HUMAN: ${AI_REQUIRE_HUMAN:-true}
      AI_MAX_CONTEXT_MESSAGES: ${AI_MAX_CONTEXT_MESSAGES:-20}
      # Robustez do motor (#1 debounce, #2 fila, #3 retry/fallback) — knobs configuráveis.
      AI_DEBOUNCE_MS: ${AI_DEBOUNCE_MS:-4000}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-30000}
      AI_LLM_RETRIES: ${AI_LLM_RETRIES:-2}
      AI_JOB_ATTEMPTS: ${AI_JOB_ATTEMPTS:-3}
      AI_WORKER_CONCURRENCY: ${AI_WORKER_CONCURRENCY:-5}
      AI_FALLBACK_MESSAGE: ${AI_FALLBACK_MESSAGE:-}
      AI_GUARDRAILS_ENABLED: ${AI_GUARDRAILS_ENABLED:-true}
      # Notificação de handoff ao operador (Slack/Teams/Discord/relay). Vazio = só log + dashboard.
      OPERATOR_NOTIFY_WEBHOOK_URL: ${OPERATOR_NOTIFY_WEBHOOK_URL:-}
    # Hot-reload: db push + seed idempotente + watch.
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             (npm run db:seed || true) &&
             npm run start:dev"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/data
    networks:
      - default
      - openwa

  frontend:
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
      TZ: ${TZ:-America/Fortaleza}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # Proxy reverso + TLS (Let's Encrypt automático). Serve o domínio e roteia
  # /api → backend (preserva prefixo) e o resto → frontend.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?defina APP_DOMAIN no .env}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
  uploads:

networks:
  # Rede do app (db, backend, frontend, caddy).
  default:
  # Rede compartilhada com o app OpenWA (criada pelo compose do OpenWA).
  openwa:
    external: true
    name: openwa-network
