# Overlay de proxy reverso + TLS. Aditivo: não altera o compose base.
#
#   docker compose -f docker-compose.yml -f docker-compose.proxy.yml up -d
#   (para prod: troque o primeiro -f por docker-compose.prod.yml)
#
# O nome de domínio é parametrizado por APP_DOMAIN no .env. Tudo deriva dele.
# Sem 'name' fixo: herda o projeto do compose base (dev ou prod).

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?defina APP_DOMAIN no .env}
      DEV_DOMAIN: ${DEV_DOMAIN:-devhealthmatch.prompthouse.ia.br}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
      - devnet

  # Injeta a identidade pública derivada de APP_DOMAIN (merge com o compose base).
  backend:
    environment:
      PUBLIC_BASE_URL: https://${APP_DOMAIN}
      CORS_ORIGIN: https://${APP_DOMAIN}
      COOKIE_SECURE: 'true'

volumes:
  caddy_data:
  caddy_config:

networks:
  default:
  # Rede do projeto de dev (healthmatch-dev) — para o Caddy alcançar os containers de dev.
  devnet:
    external: true
    name: healthmatch-dev_default
