# HealthMatch — stack de PRODUÇÃO.
#   docker compose -f docker-compose.prod.yml up --build -d
# Defina segredos reais via ambiente / .env (NÃO use os defaults em produção).
name: healthmatch-prod

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?defina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina}
      POSTGRES_DB: ${POSTGRES_DB:-healthmatch}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      target: production
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-healthmatch}?schema=public
      PORT: '3000'
      # Fuso da aplicação (default Fortaleza, parametrizável). Banco fica em UTC.
      TZ: ${TZ:-America/Fortaleza}
      CORS_ORIGIN: ${PUBLIC_URL:-http://localhost:3001}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?defina}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?defina}
      JWT_ACCESS_TTL: '900'
      JWT_REFRESH_TTL: '604800'
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      # Defina SEED_ON_START=true apenas no primeiro deploy para popular dados base.
      SEED_ON_START: ${SEED_ON_START:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@healthmatch.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme123}
      # Twilio (oficial) — segredos via .env.
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID:-}
      TWILIO_DEFAULT_CONTENT_SID: ${TWILIO_DEFAULT_CONTENT_SID:-}
      TWILIO_VALIDATE_SIGNATURE: ${TWILIO_VALIDATE_SIGNATURE:-true}
      # OpenWA (canal não-oficial, na rede compartilhada openwa-network).
      OPENWA_BASE_URL: http://openwa-api:2785
      OPENWA_API_KEY: ${OPENWA_API_KEY:-}
      OPENWA_SESSION: ${OPENWA_SESSION:-default}
      OPENWA_WEBHOOK_SECRET: ${OPENWA_WEBHOOK_SECRET:-}
      OPENWA_VALIDATE_WEBHOOK: ${OPENWA_VALIDATE_WEBHOOK:-true}
      OPENWA_SIGNATURE_HEADER: ${OPENWA_SIGNATURE_HEADER:-x-openwa-signature}
      OPENWA_HMAC_ALGO: ${OPENWA_HMAC_ALGO:-sha256}
      # IA (Épico 2) — segredos via .env.
      AI_ENABLED: ${AI_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_AUTO_REPLY: ${AI_AUTO_REPLY:-true}
      AI_DRY_RUN: ${AI_DRY_RUN:-true}
      AI_REQUIRE_HUMAN: ${AI_REQUIRE_HUMAN:-true}
      AI_MAX_CONTEXT_MESSAGES: ${AI_MAX_CONTEXT_MESSAGES:-20}
    expose:
      - '3000'
    ports:
      - '3000:3000'
    networks:
      - default
      - openwa

  frontend:
    build:
      context: ./frontend
      target: production
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
      TZ: ${TZ:-America/Fortaleza}
    ports:
      - '3001:3000'

volumes:
  pgdata:

networks:
  default:
  # Rede compartilhada com o app OpenWA (criada fora deste compose).
  openwa:
    external: true
    name: openwa-network
